services:
  postgres:
    image: postgres:16
    container_name: crowdfunding-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: crowdfunding
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD:
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crowdfunding"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
